packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  "@nestjs/core": true
  "@prisma/client": true
  "@prisma/engines": true
  # @sentry/cli's postinstall downloads a binary used only for build-time
  # source-map upload. Not needed for error capture; skipped to save disk.
  # Source maps can be enabled later by flipping this to true on the build host.
  "@sentry/cli": false
  "@swc/core": true
  argon2: true
  cpu-features: true
  esbuild: true
  prisma: true
  protobufjs: true
  sharp: true
  ssh2: true
  unrs-resolver: true
