# Production-demo stack for Staffly — PostgreSQL 18 ONLY.
#
# Differences from docker-compose.dev.yml:
#   - Postgres is bound to 127.0.0.1 (never publicly reachable; the API
#     reaches it over loopback, public traffic arrives via Cloudflare Tunnel).
#   - Credentials come from the environment, not hardcoded.
#   - No Redis (unused), no MailHog (email is Phase F/Resend), no MinIO
#     (object storage is Cloudflare R2, external to this host).
#
# Bring up:
#   POSTGRES_PASSWORD=... docker compose -f infra/docker-compose.prod.yml up -d
#
# The API itself is NOT containerized — it runs under PM2 (see
# ecosystem.config.cjs). This file provisions the database only.

services:
  postgres:
    # PG 18 ships native uuidv7(), which the schema depends on (31 column
    # defaults). Do not downgrade — see docs/02 § 1.2 and the deployment audit.
    image: postgres:18-alpine
    container_name: staffly-postgres-demo
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-staffly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the shell or an env file}
      POSTGRES_DB: ${POSTGRES_DB:-staffly}
    ports:
      # Loopback-only. The demo DB must never be exposed to the internet;
      # public access is solely through the API behind Cloudflare Tunnel.
      - "127.0.0.1:5433:5432"
    volumes:
      # PG 18+ images store data under /var/lib/postgresql/<major>/docker.
      # Mount the parent so the image manages the pg_ctlcluster layout.
      - staffly_pg_demo:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-staffly} -d ${POSTGRES_DB:-staffly}",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  staffly_pg_demo:
