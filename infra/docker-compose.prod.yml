# Staffly production database stack for a small EC2 VPS.
#
# The application processes run directly under PM2. This compose file only
# provisions PostgreSQL 18, which is required because the Prisma schema uses
# native uuidv7() defaults.
#
# Usage:
#   docker compose --env-file /opt/staffly/shared/env/postgres.env \
#     -f infra/docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:18-alpine
    container_name: staffly-postgres
    restart: unless-stopped
    shm_size: "128mb"
    mem_limit: "384m"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-staffly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-staffly}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "127.0.0.1:5433:5432"
    command:
      - "postgres"
      - "-c"
      - "max_connections=30"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "wal_buffers=8MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    volumes:
      - staffly_pg_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-staffly} -d ${POSTGRES_DB:-staffly}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  staffly_pg_data:
