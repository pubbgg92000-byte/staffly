# Dev stack for Staffly. Bring up with:
#   docker compose -f infra/docker-compose.dev.yml up -d
#
# Services:
#   postgres  18        DB                http://localhost:5433
#   redis     7         cache + queues    http://localhost:6379
#   mailhog             dev SMTP + UI     SMTP :1025  UI :8025
#   minio               S3-compatible     :9000   console :9001
#
# All data persists in named volumes. Stop + drop with `docker compose down -v`.

services:
  postgres:
    # PG 18 ships native uuidv7() — see docs/02 § 1.2.
    image: postgres:18-alpine
    container_name: staffly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: staffly
      POSTGRES_PASSWORD: staffly_dev_password
      POSTGRES_DB: staffly
    ports:
      # Host 5433 → container 5432 to avoid collisions with a local Postgres
      # listening on 5432. Update apps/api/.env DATABASE_URL to match.
      - "5433:5432"
    volumes:
      # PG 18+ images store data under /var/lib/postgresql/<major>/docker
      # (pg_ctlcluster layout). Mount the parent so the image can manage that.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staffly -d staffly"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: staffly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  mailhog:
    image: mailhog/mailhog:latest
    container_name: staffly-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  minio:
    image: minio/minio:latest
    container_name: staffly-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: staffly
      MINIO_ROOT_PASSWORD: staffly_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
